<!doctype html>
<html lang="th">
  <head>
    <!--
      External script policy (R14 / D3): if you add a <script> or <link>
      pointing at a non-`self` origin (CDN, third-party host, …), it
      MUST also carry `integrity="sha384-…"` and `crossorigin="anonymous"`.
      See frontend/README.md#external-script-policy-r14--d3 for the
      rule, the hash recipe, and the good-vs-bad examples. Same-origin
      assets (everything Vite emits and the favicon above) are
      explicitly exempt — the browser already trusts them.
    -->
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="แอปบันทึกรายรับ-รายจ่ายส่วนบุคคล พร้อมแดชบอร์ด 6 เดือน หมวดหมู่ระบบและหมวดหมู่ส่วนตัว ส่งออก CSV รองรับหลายผู้ใช้" />
    <meta name="theme-color" content="#0f172a" />
    <!--
      Content-Security-Policy is injected at build time by the Vite plugin
      in `vite.config.ts` (see `injectCspPlugin`). The plugin reads
      `buildCspPolicy` from `src/lib/csp.ts` and appends the meta tag below
      these static <meta> tags. Don't add a static CSP <meta> here — the
      injected one will reflect `VITE_API_URL` / dev extras correctly.
    -->
    <title>Expense Tracker — บันทึกรายรับรายจ่าย</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
